version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  read_write:
  - /tmp
  - /dev/null
  - /sandbox/.Hermes
  - /sandbox/.nemoclaw
  - /home/linuxbrew
  - /sandbox
  - /home/yahwehatwork
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  brave:
    name: brave
    endpoints:
    - host: api.search.brave.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/node
    - path: /usr/bin/node
    - path: /usr/bin/curl
  brew:
    name: brew
    endpoints:
    - host: formulae.brew.sh
      port: 443
      tls: skip
      access: full
    - host: github.com
      port: 443
      tls: skip
      access: full
    - host: ghcr.io
      port: 443
      tls: skip
      access: full
    - host: pkg-containers.githubusercontent.com
      port: 443
      tls: skip
      access: full
    - host: objects.githubusercontent.com
      port: 443
      tls: skip
      access: full
    - host: raw.githubusercontent.com
      port: 443
      tls: skip
      access: full
    binaries:
    - path: /usr/bin/curl
    - path: /usr/bin/git
    - path: /usr/local/bin/brew
    - path: /home/linuxbrew/.linuxbrew/bin/brew
    - path: /home/linuxbrew/.linuxbrew/bin/*
    - path: /home/linuxbrew/.linuxbrew/Homebrew/bin/*
  clawhub:
    name: clawhub
    endpoints:
    - host: clawhub.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/Hermes
    - path: /usr/local/bin/node
  huggingface:
    name: huggingface
    endpoints:
    - host: huggingface.co
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    - host: cdn-lfs.huggingface.co
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    - host: router.huggingface.co
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/python3
    - path: /usr/local/bin/node
  managed_inference:
    name: managed_inference
    endpoints:
    - host: inference.local
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/Hermes
    - path: /usr/local/bin/node
    - path: /usr/bin/node
    - path: /usr/bin/curl
    - path: /usr/bin/python3
  npm_registry:
    name: npm_registry
    endpoints:
    - host: registry.npmjs.org
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/Hermes
  npm_yarn:
    name: npm_yarn
    endpoints:
    - host: registry.npmjs.org
      port: 443
      tls: skip
      access: full
    - host: registry.yarnpkg.com
      port: 443
      tls: skip
      access: full
    binaries:
    - path: /usr/local/bin/npm*
    - path: /usr/local/bin/npx*
    - path: /usr/local/bin/node*
    - path: /usr/local/bin/yarn*
    - path: /usr/bin/npm*
    - path: /usr/bin/node*
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    - host: inference-api.nvidia.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    binaries:
    - path: /usr/local/bin/Hermes
  Hermes-pricing:
    name: Hermes-pricing
    endpoints:
    - host: raw.githubusercontent.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /BerriAI/litellm/main/model_prices_and_context_window.json
    - host: openrouter.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /api/v1/models
    binaries:
    - path: /usr/local/bin/node
    - path: /usr/bin/node
  Hermes_api:
    name: Hermes_api
    endpoints:
    - host: Hermes.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/Hermes
    - path: /usr/local/bin/node
  Hermes_docs:
    name: Hermes_docs
    endpoints:
    - host: docs.Hermes.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/Hermes
  pypi:
    name: pypi
    endpoints:
    - host: pypi.org
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: HEAD
          path: /**
    - host: files.pythonhosted.org
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: HEAD
          path: /**
    binaries:
    - path: /usr/bin/python3*
    - path: /usr/bin/pip*
    - path: /usr/local/bin/python3*
    - path: /usr/local/bin/pip*
    - path: /sandbox/.venv/bin/python*
    - path: /sandbox/.venv/bin/pip*
    - path: /sandbox/.uv/python/**/python*
    - path: /sandbox/.local/bin/pip*
